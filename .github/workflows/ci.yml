name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: dpp
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: dpp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dpp"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: dpp_test
      DB_USERNAME: dpp
      DB_PASSWORD: secret

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, pdo_pgsql, pgsql, mbstring, gd
          coverage: none

      - name: Enable Postgres extensions
        env:
          PGPASSWORD: secret
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client
          psql -h 127.0.0.1 -U dpp -d dpp_test -c "CREATE EXTENSION IF NOT EXISTS citext; CREATE EXTENSION IF NOT EXISTS pgcrypto;"

      - name: Composer install
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Lint (Pint)
        run: ./vendor/bin/pint --test

      - name: Run tests (PHPUnit against Postgres)
        run: php artisan test

      - name: Build front-end assets
        run: |
          npm ci
          npm run build
